<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Responsive Image Gallery</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <h1>Responsive Image Gallery</h1>
        <p>Explore Beautiful Images</p>
    </header>

    <!-- Filter Buttons -->
    <div class="buttons">

        <button class="filter-btn active" data-filter="all">All</button>

        <button class="filter-btn" data-filter="nature">Nature</button>

        <button class="filter-btn" data-filter="city">City</button>

        <button class="filter-btn" data-filter="food">Food</button>

        <button class="filter-btn" data-filter="technology">Technology</button>

    </div>

    <!-- Image Gallery -->
    <div class="gallery">

        <img src="nature1.jpg" class="gallery-item" data-category="nature">

        <img src="nature2.jpg" class="gallery-item" data-category="nature">

        <img src="nature3.jpg" class="gallery-item" data-category="nature">

        <img src="nature4.jpg" class="gallery-item" data-category="nature">

        <img src="nature5.jpg" class="gallery-item" data-category="nature">

        <img src="city2.jpg" class="gallery-item" data-category="city">

        <img src="city3.jpg" class="gallery-item" data-category="city">

        <img src="city4.jpg" class="gallery-item" data-category="city">

        <img src="city5.jpg" class="gallery-item" data-category="city">

        <img src="food1.webp" class="gallery-item" data-category="food">

        <img src="food2.jpg" class="gallery-item" data-category="food">

        <img src="food3.jpg" class="gallery-item" data-category="food">

        <img src="food4.jpg" class="gallery-item" data-category="food">

        <img src="food5.jpg" class="gallery-item" data-category="food">

        <img src="tech1.jpg" class="gallery-item" data-category="technology">

        <img src="tech2.jpg" class="gallery-item" data-category="technology">

        <img src="tech3.jpg" class="gallery-item" data-category="technology">

        <img src="tech4.jpg" class="gallery-item" data-category="technology">

        <img src="tech5.jpg" class="gallery-item" data-category="technology">

    </div>

    <!-- Lightbox -->
    <div class="lightbox">

        <span class="close">&times;</span>

        <button class="prev">&#10094;</button>

        <img class="lightbox-image">

        <button class="next">&#10095;</button>

    </div>

    <script src="script.js"></script>

</body>

</html>
